services:
  backend:
    build:
      context: ./backend
    environment:
      DJANGO_DEBUG: "1"
      CORS_ALLOW_ALL_ORIGINS: "1"
      SQLITE_PATH: /app/data/db.sqlite3
    volumes:
      - backend-data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_PROXY: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend-data:
